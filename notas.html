<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notas</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1C1917">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Notas">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --surface: #FDFBF8;
    --ink: #1C1917;
    --ink-soft: #78716C;
    --ink-faint: #D6D3CE;
    --accent: #C2410C;
    --accent-soft: #FEF3EE;
    --radius: 4px;
  }

  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--ink-faint);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
  }

  .btn-new {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--ink);
    color: var(--surface);
    border: none;
    border-radius: var(--radius);
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.15s;
  }

  .btn-new:hover { background: var(--accent); }

  /* ── VIEWS ── */
  #view-list, #view-edit {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  #view-edit { display: none; }

  /* ── LIST ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--ink-soft);
    padding: 40px 20px;
    text-align: center;
  }

  .empty-state svg { opacity: 0.25; }
  .empty-state p { font-size: 0.9rem; font-style: italic; }

  .notes-list {
    padding: 16px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .note-card:active {
    border-color: var(--ink-soft);
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .note-card-title {
    font-size: 0.95rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .note-card-preview {
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: normal;
  }

  .note-card-date {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    color: var(--ink-faint);
    margin-top: 8px;
  }

  /* ── EDITOR ── */
  .editor-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--ink-faint);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .btn-back {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    padding: 4px;
    border-radius: var(--radius);
    transition: color 0.15s;
  }

  .btn-back:hover { color: var(--ink); }

  .editor-header-actions {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-icon:hover { border-color: var(--ink-soft); color: var(--ink); }
  .btn-icon.danger:hover { border-color: #EF4444; color: #EF4444; }

  .editor-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 18px;
    gap: 12px;
    overflow-y: auto;
  }

  #note-title {
    font-family: 'Lora', serif;
    font-size: 1.3rem;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    width: 100%;
    letter-spacing: -0.02em;
  }

  #note-title::placeholder { color: var(--ink-faint); }

  .divider {
    height: 1px;
    background: var(--ink-faint);
    width: 40px;
  }

  #note-body {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    line-height: 1.75;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    width: 100%;
    resize: none;
    min-height: 60vh;
  }

  #note-body::placeholder { color: var(--ink-faint); font-style: italic; }

  .word-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--ink-faint);
    text-align: right;
    padding: 0 18px 16px;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--surface);
    padding: 9px 18px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.02em;
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── MODAL DELETE ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,25,23,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 12px 12px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h3 {
    font-size: 1rem;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin-bottom: 20px;
    font-style: italic;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--ink-faint);
    border-radius: var(--radius);
    background: transparent;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .btn-delete-confirm {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: var(--radius);
    background: #EF4444;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- ── LIST VIEW ── -->
<div id="view-list">
  <header>
    <div class="logo">notas<span>.</span></div>
    <button class="btn-new" onclick="newNote()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      nova nota
    </button>
  </header>

  <div id="empty-state" class="empty-state">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
      <rect x="8" y="6" width="32" height="36" rx="3" stroke="#1C1917" stroke-width="1.5"/>
      <line x1="16" y1="16" x2="32" y2="16" stroke="#1C1917" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="22" x2="32" y2="22" stroke="#1C1917" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="16" y1="28" x2="24" y2="28" stroke="#1C1917" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p>Nenhuma nota ainda.<br>Toque em "nova nota" para começar.</p>
  </div>

  <div id="notes-list" class="notes-list" style="display:none"></div>
</div>

<!-- ── EDIT VIEW ── -->
<div id="view-edit">
  <div class="editor-header">
    <button class="btn-back" onclick="goBack()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12 5l-5 5 5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="editor-header-actions">
      <button class="btn-icon" onclick="saveNote()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 7l3.5 3.5L11 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        salvar
      </button>
      <button class="btn-icon danger" onclick="askDelete()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3.5h9M5 3.5V2.5a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 .5.5v1M5.5 6v4M7.5 6v4M3 3.5l.5 7a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5l.5-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div class="editor-body">
    <input id="note-title" type="text" placeholder="Título" maxlength="80" oninput="updateCount()">
    <div class="divider"></div>
    <textarea id="note-body" placeholder="Escreva aqui..." oninput="autoResize(this); updateCount()"></textarea>
  </div>
  <div class="word-count" id="word-count">0 palavras</div>
</div>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Apagar nota?</h3>
    <p>Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">cancelar</button>
      <button class="btn-delete-confirm" onclick="deleteNote()">apagar</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
  let notes = JSON.parse(localStorage.getItem('notas_app') || '[]');
  let currentId = null;

  function save() {
    localStorage.setItem('notas_app', JSON.stringify(notes));
  }

  function renderList() {
    const list = document.getElementById('notes-list');
    const empty = document.getElementById('empty-state');

    if (notes.length === 0) {
      empty.style.display = 'flex';
      list.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    list.style.display = 'flex';

    const sorted = [...notes].sort((a, b) => b.updatedAt - a.updatedAt);

    list.innerHTML = sorted.map(n => {
      const d = new Date(n.updatedAt);
      const dateStr = d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' });
      const title = n.title || 'Sem título';
      const preview = n.body.replace(/\n/g, ' ').trim() || '—';
      return `
        <div class="note-card" onclick="openNote('${n.id}')">
          <div class="note-card-title">${escHtml(title)}</div>
          <div class="note-card-preview">${escHtml(preview)}</div>
          <div class="note-card-date">${dateStr}</div>
        </div>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function showView(v) {
    document.getElementById('view-list').style.display = v === 'list' ? 'flex' : 'none';
    document.getElementById('view-edit').style.display = v === 'edit' ? 'flex' : 'none';
  }

  function newNote() {
    currentId = Date.now().toString();
    document.getElementById('note-title').value = '';
    document.getElementById('note-body').value = '';
    updateCount();
    showView('edit');
    setTimeout(() => document.getElementById('note-title').focus(), 100);
  }

  function openNote(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentId = id;
    document.getElementById('note-title').value = note.title;
    document.getElementById('note-body').value = note.body;
    autoResize(document.getElementById('note-body'));
    updateCount();
    showView('edit');
  }

  function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const body = document.getElementById('note-body').value;
    if (!title && !body.trim()) { showToast('nota vazia'); return; }

    const idx = notes.findIndex(n => n.id === currentId);
    if (idx >= 0) {
      notes[idx] = { ...notes[idx], title, body, updatedAt: Date.now() };
    } else {
      notes.push({ id: currentId, title, body, updatedAt: Date.now() });
    }
    save();
    showToast('nota salva ✓');
  }

  function goBack() {
    saveNote();
    renderList();
    showView('list');
  }

  function askDelete() {
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function deleteNote() {
    notes = notes.filter(n => n.id !== currentId);
    save();
    closeModal();
    renderList();
    showView('list');
    showToast('nota apagada');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function updateCount() {
    const t = document.getElementById('note-title').value;
    const b = document.getElementById('note-body').value;
    const words = (t + ' ' + b).trim().split(/\s+/).filter(w => w).length;
    document.getElementById('word-count').textContent = words + (words === 1 ? ' palavra' : ' palavras');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // init
  renderList();
  showView('list');

  // Registra o Service Worker (PWA)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
